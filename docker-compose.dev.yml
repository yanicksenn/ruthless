services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ruthless_user
      POSTGRES_PASSWORD: ruthless_password
      POSTGRES_DB: ruthless_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruthless_user -d ruthless_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  backend:
    image: backend:latest
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - STORAGE=postgres
      - DB_CONN_STR=postgres://ruthless_user:ruthless_password@db:5432/ruthless_dev?sslmode=disable
      - AUTH=fake
      - UI_URL=http://localhost:3000
      - AUTH_SECRET=dev-secret
    command: ["server"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: frontend:latest
    restart: on-failure
    ports:
      - "3000:80"
    depends_on:
      - backend
