syntax = "proto3";

package ruthless.v1;

option go_package = "github.com/yanicksenn/ruthless/api/v1;ruthlespb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "config.proto";

enum CardColor {
  CARD_COLOR_UNSPECIFIED = 0;
  CARD_COLOR_BLACK = 1;
  CARD_COLOR_WHITE = 2;
}

message Card {
  string id = 1;
  string text = 2;
  CardColor color = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  string owner_id = 6;
}

message Player {
  string id = 1;
  string name = 2;
}

message User {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  string identifier = 4;
  bool pending_completion = 5;
}

message Deck {
  string id = 1;
  string name = 2;
  string owner_id = 3;
  repeated string contributors = 4;
  repeated string card_ids = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Session {
  string id = 1;
  repeated string player_ids = 2;
  repeated string deck_ids = 3;
  string owner_id = 4;
}

enum GameState {
  GAME_STATE_UNSPECIFIED = 0;
  GAME_STATE_WAITING = 1;
  GAME_STATE_PLAYING = 2;
  GAME_STATE_JUDGING = 3;
  GAME_STATE_FINISHED = 4;
  GAME_STATE_ABANDONED = 5;
}

message PlayerHand {
  repeated Card cards = 1;
}

message Play {
  string id = 1;
  string player_id = 2;
  repeated Card cards = 3;
}

message Round {
  string id = 1;
  string czar_id = 2;
  Card black_card = 3;
  map<string, Play> plays = 4;
  string winning_play_id = 5;
}

message Game {
  string id = 1;
  string session_id = 2;
  GameState state = 3;
  repeated Round rounds = 4;
  map<string, uint32> scores = 5; // player_id -> score
  map<string, PlayerHand> hidden_hands = 6;
  repeated Card hidden_black_deck = 7;
  repeated Card hidden_white_deck = 8;
  repeated Player players = 9;
  repeated string player_ids = 10;
  google.protobuf.Timestamp created_at = 11;
  uint32 min_required_players = 12;
}

// ----------------- Card Service -----------------

enum CardOrderField {
  CARD_ORDER_FIELD_UNSPECIFIED = 0;
  CARD_ORDER_FIELD_TEXT = 1;
  CARD_ORDER_FIELD_CREATED_AT = 2;
}

message CardOrder {
  CardOrderField field = 1;
  bool descending = 2;
}

message ListCardsRequest {
  int32 page_size = 1;
  int32 page_number = 2;
  repeated string ids = 3;
  string filter = 4;
  CardOrder order_by = 5;
}

message ListCardsResponse {
  repeated Card cards = 1;
  int32 total_count = 2;
}

message DeleteCardRequest {
  string id = 1;
}

message CreateCardRequest {
  string text = 1;
}

service CardService {
  rpc ListCards (ListCardsRequest) returns (ListCardsResponse);
  rpc CreateCard (CreateCardRequest) returns (Card);
  rpc DeleteCard (DeleteCardRequest) returns (google.protobuf.Empty);
  rpc GetConfig (google.protobuf.Empty) returns (Config);
}

// ----------------- Deck Service -----------------

message ListDecksRequest {}
message ListDecksResponse {
  repeated Deck decks = 1;
}

message GetDeckRequest {
  string id = 1;
}

message CreateDeckRequest {
  string name = 1;
}

message AddContributorRequest {
  string deck_id = 1;
  string contributor_id = 2;
}
message AddContributorResponse {}

message RemoveContributorRequest {
  string deck_id = 1;
  string contributor_id = 2;
}
message RemoveContributorResponse {}

message AddCardToDeckRequest {
  string deck_id = 1;
  string card_id = 2;
}
message AddCardToDeckResponse {}

message RemoveCardFromDeckRequest {
  string deck_id = 1;
  string card_id = 2;
}
message RemoveCardFromDeckResponse {}

service DeckService {
  rpc ListDecks (ListDecksRequest) returns (ListDecksResponse);
  rpc GetDeck (GetDeckRequest) returns (Deck);
  rpc CreateDeck (CreateDeckRequest) returns (Deck);
  rpc AddContributor (AddContributorRequest) returns (AddContributorResponse);
  rpc RemoveContributor (RemoveContributorRequest) returns (RemoveContributorResponse);
  rpc AddCardToDeck (AddCardToDeckRequest) returns (AddCardToDeckResponse);
  rpc RemoveCardFromDeck (RemoveCardFromDeckRequest) returns (RemoveCardFromDeckResponse);
}

// ----------------- Session Service -----------------

message CreateSessionRequest {
  repeated string deck_ids = 1;
}

message JoinSessionRequest {
  string session_id = 1;
  string player_name = 2;
}

message GetSessionRequest {
  string id = 1;
}

message AddDeckToSessionRequest {
  string session_id = 1;
  string deck_id = 2;
}
message AddDeckToSessionResponse {}

message ListSessionsRequest {}
message ListSessionsResponse {
  repeated Session sessions = 1;
}

message LeaveSessionRequest {
  string session_id = 1;
}
message LeaveSessionResponse {}

service SessionService {
  rpc CreateSession (CreateSessionRequest) returns (Session);
  rpc JoinSession (JoinSessionRequest) returns (Session);
  rpc LeaveSession (LeaveSessionRequest) returns (LeaveSessionResponse);
  rpc GetSession (GetSessionRequest) returns (Session);
  rpc AddDeckToSession (AddDeckToSessionRequest) returns (AddDeckToSessionResponse);
  rpc ListSessions (ListSessionsRequest) returns (ListSessionsResponse);
}

// ----------------- User Service -----------------

message RegisterRequest {
  string name = 1; // Optional, defaults to identity name if providing a name during register is still desired
}

message CompleteRegistrationRequest {
  string name = 1;
}
message GetMeRequest {}

service UserService {
  rpc Register (RegisterRequest) returns (User);
  rpc CompleteRegistration (CompleteRegistrationRequest) returns (User);
  rpc GetMe (GetMeRequest) returns (User);
}

// ----------------- Game Service -----------------


message GetGameRequest {
  string id = 1;
}

message GetGameBySessionRequest {
  string session_id = 1;
}

message StartGameRequest {
  string id = 1;
}

message PlayCardsRequest {
  string game_id = 1;
  repeated string card_ids = 2;
}
message PlayCardsResponse {
  string play_id = 1;
}

message SelectWinnerRequest {
  string game_id = 1;
  string play_id = 2;
}
message SelectWinnerResponse {}

message GetHandRequest {
  string game_id = 1;
}
message GetHandResponse {
  repeated Card cards = 1;
}

service GameService {
  rpc GetGame (GetGameRequest) returns (Game);
  rpc StartGame (StartGameRequest) returns (Game);
  rpc PlayCards (PlayCardsRequest) returns (PlayCardsResponse);
  rpc SelectWinner (SelectWinnerRequest) returns (SelectWinnerResponse);
  rpc GetHand (GetHandRequest) returns (GetHandResponse);
  rpc GetGameBySession (GetGameBySessionRequest) returns (Game);
}

