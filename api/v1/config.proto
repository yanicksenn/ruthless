syntax = "proto3";

package ruthless.v1;

option go_package = "github.com/yanicksenn/ruthless/api/v1;ruthlespb";

message Config {
  ConfigPublic public = 1;
  ConfigPrivate private = 2;
}

message ConfigPublic {
  message Limits {
    uint32 max_user_name_length = 1;
    uint32 min_user_name_length = 2;
    uint32 max_card_text_length = 3;
    uint32 max_deck_name_length = 4;
    uint32 max_session_name_length = 5;
    uint32 max_cards_per_user = 6;
    uint32 max_decks_per_user = 7;
    uint32 max_cards_per_deck = 8;
    uint32 max_contributors_per_deck = 9;
    uint32 max_decks_per_session = 10;
    uint32 max_players_per_session = 11;
    uint32 max_sessions_per_user = 12;
    uint32 max_cards_per_session = 13;
  }
  message Game {
    uint32 min_required_players = 1;
  }
  message Registration {
    uint32 max_unique_identifier_recreations = 1;
    string google_client_id = 2;
  }
  Limits limits = 1;
  Game game = 2;
  Registration registration = 3;
}

enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_GOOGLE = 1;
  AUTH_PROVIDER_FAKE = 2;
}

message ConfigPrivate {
  message Registration {
    string google_client_secret = 1;
  }
  Registration registration = 1;
}

